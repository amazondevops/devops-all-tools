apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-uat-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@bitbucket.org:junglee_games/dmnd-pkrb-gitops-nprod.git
    targetRevision: HEAD
    path: application/manifest/gateway/dev/gateway-external.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
