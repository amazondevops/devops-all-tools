e                    es\n    Alias                   es-carrom\n    Match                   carrom.*\n    Host                    10.34.204.127\n    HTTP_User               elastic\n    HTTP_Passwd             elastic@444\n    Port                    9200\n    Logstash_Format         On\n    Logstash_Prefix         carrom-logs\n","output-kafka.conf":"[OUTPUT]\n    Name   stdout\n    Match  tournament-settlement.*\n    Format json\n[OUTPUT]\n    Name           kafka\n    Match          tournament.*\n    Brokers        10.34.163.23:9092,10.34.180.145:9092\n    Topics         pok-tour-logs\n    Timestamp_Key  @timestamp\n    Retry_Limit    false\n    # hides errors \"Receive failed: Disconnected\" when kafka kills idle connections\n    rdkafka.log.connection.close false\n    # producer buffer is not included in http://fluentbit.io/documentation/0.12/configuration/memory_usage.html#estimating\n    rdkafka.queue.buffering.max.kbytes 10240\n    # for logs you'll probably want this ot be 0 or 1, not more\n    rdkafka.request.required.acks 1\n[OUTPUT]\n    Name           kafka\n    Match          rumble.*\n    Brokers        10.34.163.23:9092,10.34.180.145:9092\n    Topics         pok-rum-logs\n    Timestamp_Key  @timestamp\n    Retry_Limit    false\n    # hides errors \"Receive failed: Disconnected\" when kafka kills idle connections\n    rdkafka.log.connection.close false\n    # producer buffer is not included in http://fluentbit.io/documentation/0.12/configuration/memory_usage.html#estimating\n    rdkafka.queue.buffering.max.kbytes 10240\n    # for logs you'll probably want this ot be 0 or 1, not more\n    rdkafka.request.required.acks 1\n[OUTPUT]\n    Name           kafka\n    Match          poker.*\n    Brokers        10.34.163.23:9092,10.34.180.145:9092\n    Topics         pok-logs\n    Timestamp_Key  @timestamp\n    Retry_Limit    false\n    # hides errors \"Receive failed: Disconnected\" when kafka kills idle connections\n    rdkafka.log.connection.close false\n    # producer buffer is not included in http://fluentbit.io/documentation/0.12/configuration/memory_usage.html#estimating\n    rdkafka.queue.buffering.max.kbytes 10240\n    # for logs you'll probably want this ot be 0 or 1, not more\n    rdkafka.request.required.acks 1\n","parsers.conf":"[PARSER]\n    # http://rubular.com/r/tjUt3Awgg4\n    Name cri\n    Format regex\n    Regex ^(?\u003ctime\u003e[^ ]+) (?\u003cstream\u003estdout|stderr) (?\u003clogtag\u003e[^ ]*) (?\u003clog\u003e.*)$\n    Time_Key    time\n    Time_Format %Y-%m-%dT%H:%M:%S.%L%z\n[PARSER]\n    Name   apache\n    Format regex\n    Regex  ^(?\u003chost\u003e[^ ]*) [^ ]* (?\u003cuser\u003e[^ ]*) \\[(?\u003ctime\u003e[^\\]]*)\\] \"(?\u003cmethod\u003e\\S+)(?: +(?\u003cpath\u003e[^\\\"]*?)(?: +\\S*)?)?\" (?\u003ccode\u003e[^ ]*) (?\u003csize\u003e[^ ]*)(?: \"(?\u003creferer\u003e[^\\\"]*)\" \"(?\u003cagent\u003e[^\\\"]*)\")?$\n    Time_Key time\n    Time_Format %d/%b/%Y:%H:%M:%S %z\n\n[PARSER]\n    Name   apache2\n    Format regex\n    Regex  ^(?\u003chost\u003e[^ ]*) [^ ]* (?\u003cuser\u003e[^ ]*) \\[(?\u003ctime\u003e[^\\]]*)\\] \"(?\u003cmethod\u003e\\S+)(?: +(?\u003cpath\u003e[^ ]*) +\\S*)?\" (?\u003ccode\u003e[^ ]*) (?\u003csize\u003e[^ ]*)(?: \"(?\u003creferer\u003e[^\\\"]*)\" \"(?\u003cagent\u003e[^\\\"]*)\")?$\n    Time_Key time\n    Time_Format %d/%b/%Y:%H:%M:%S %z\n\n[PARSER]\n    Name   apache_error\n    Format regex\n    Regex  ^\\[[^ ]* (?\u003ctime\u003e[^\\]]*)\\] \\[(?\u003clevel\u003e[^\\]]*)\\](?: \\[pid (?\u003cpid\u003e[^\\]]*)\\])?( \\[client (?\u003cclient\u003e[^\\]]*)\\])? (?\u003cmessage\u003e.*)$\n\n[PARSER]\n    Name   nginx\n    Format regex\n    Regex ^(?\u003cremote\u003e[^ ]*) (?\u003chost\u003e[^ ]*) (?\u003cuser\u003e[^ ]*) \\[(?\u003ctime\u003e[^\\]]*)\\] \"(?\u003cmethod\u003e\\S+)(?: +(?\u003cpath\u003e[^\\\"]*?)(?: +\\S*)?)?\" (?\u003ccode\u003e[^ ]*) (?\u003csize\u003e[^ ]*)(?: \"(?\u003creferer\u003e[^\\\"]*)\" \"(?\u003cagent\u003e[^\\\"]*)\")?$\n    Time_Key time\n    Time_Format %d/%b/%Y:%H:%M:%S %z\n\n[PARSER]\n    Name   json\n    Format json\n    Time_Key time\n    Time_Format %d/%b/%Y:%H:%M:%S %z\n\n[PARSER]\n    Name        docker\n    Format      json\n    Time_Key    time\n    Time_Format %Y-%m-%dT%H:%M:%S.%L\n    Time_Keep   On\n\n[PARSER]\n    Name        syslog\n    Format      regex\n    Regex       ^\\\u003c(?\u003cpri\u003e[0-9]+)\\\u003e(?\u003ctime\u003e[^ ]* {1,2}[^ ]* [^ ]*) (?\u003chost\u003e[^ ]*) (?\u003cident\u003e[a-zA-Z0-9_\\/\\.\\-]*)(?:\\[(?\u003cpid\u003e[0-9]+)\\])?(?:[^\\:]*\\:)? *(?\u003cmessage\u003e.*)$\n    Time_Key    time\n    Time_Format %b %d %H:%M:%S\n"},"kind":"ConfigMap","metadata":{"annotations":{},"creationTimestamp":"2024-09-20T12:28:31Z","labels":{"k8s-app":"fluent-bit"},"name":"fluent-bit-config","namespace":"logging","resourceVersion":"2491990232","uid":"c68803c4-f1c8-44af-b52c-d37cb2d9e737"}}
    creationTimestamp: "2024-09-20T12:28:31Z"
    labels:
      k8s-app: fluent-bit
