apiVersion: v1
items:
- apiVersion: v1
  data:
    filter-kubernetes.conf: |-
      [FILTER]
          Name                kubernetes
          Match               carrom.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     carrom.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  On
      [FILTER]
          Name                kubernetes
          Match               tournament.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     tournament.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  Off
      [FILTER]
          Name                kubernetes
          Match               poker.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     poker.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  On
      [FILTER]
          Name                kubernetes
          Match               rumble.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     rumble.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  off
      [FILTER]
          Name                kubernetes
          Match               ludo.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     ludo.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  off
      [FILTER]
          Name                kubernetes
          Match               kube.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     kube.var.log.containers.
          Merge_Log           On
          Merge_Log_Key       log_processed
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off
      [FILTER]
          Name                kubernetes
          Match               teenpatti.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     teenpatti.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  On
      [FILTER]
          Name                kubernetes
          Match               howzat.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     howzat.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  On
      [FILTER]
          Name                kubernetes
          Match               tournament-ums.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     tournament-ums.var.log.containers.
          Merge_Log           off
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  off
    fluent-bit.conf: |
      [SERVICE]
          Flush         1
          Log_Level     info
          Daemon        off
          Parsers_File  parsers.conf
          HTTP_Server   On
          HTTP_Listen   0.0.0.0
          HTTP_Port     2020
      @INCLUDE input-kubernetes.conf
      @INCLUDE filter-kubernetes.conf
      @INCLUDE output-kafka.conf
      @INCLUDE output-es.conf
    input-kubernetes.conf: |2

      [INPUT]
          Name              tail
          Alias             tail-kube
          Tag               kube.*
          Path              /var/log/containers/*.log
          Exclude_Path      /var/log/containers/*_cert-manager_*.log, /var/log/containers/dummy-pod-for-secrets*.log, /var/log/containers/*argocd*.log, /var/log/containers/*_default_*.log, /var/log/containers/*_istio-system_*.log, /var/log/containers/*_jenkins_*.log, /var/log/containers/*_kube-node-lease_*.log, /var/log/containers/*_kube-public_*.log, /var/log/containers/*_kube-system_*.log, /var/log/containers/*_logging_*.log, /var/log/containers/*_monitoring_*.log, /var/log/containers/*_newrelic_*.log, /var/log/containers/*_olm_*.log, /var/log/containers/*_istio-operator_*.log, /var/log/containers/*_sumologic_*.log, /var/log/containers/*_consul-client_*.log
          Parser            docker
          DB                /var/log/flb_kube.db
          Mem_Buf_Limit     10MB
          Skip_Long_Lines   On
          Refresh_Interval  10
      [INPUT]
          Name              tail
          Alias             tail-tournament
          Tag               tournament.*
          Path              /var/log/containers/*tournament*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*_jenkins_*.log,/var/log/containers/*jtp*.log
          multiline.parser           cri
          DB                /var/log/flb_kube11.db
          Mem_Buf_Limit     256MB
          Skip_Long_Lines   Off
          Buffer_Max_Size   50M
          Buffer_Chunk_Size 30M
          Refresh_Interval  1
          Read_from_Head    On
          Rotate_wait       30
      [INPUT]
          Name              tail
          Alias             tail-tournament-ums
          Tag               tournament-ums.*
          Path              /var/log/containers/*tournament-ums*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*_jenkins_*.log,/var/log/containers/*jtp*.log
          multiline.parser           cri
          DB                /var/log/flb_kube11.db
          Mem_Buf_Limit     96MB
          Skip_Long_Lines   Off
          Buffer_Max_Size   10M
          Buffer_Chunk_Size 50K
          Refresh_Interval  1
          Read_from_Head    On
          Rotate_wait       30
      [INPUT]
          Name              tail
          Alias             tail-rumble
          Tag               rumble.*
          Path              /var/log/containers/*rumble*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*_jenkins_*.log,/var/log/containers/*jtp*.log
          multiline.parser  cri
          DB                /var/log/flb_kube11.db
          Mem_Buf_Limit     256MB
          Skip_Long_Lines   Off
          Buffer_Max_Size   50M
          Buffer_Chunk_Size 30M
          Refresh_Interval  1
          Read_from_Head    On
          Rotate_wait       30
      [INPUT]
          Name              tail
          Alias             tail-carrom
          Tag               carrom.*
          Path              /var/log/containers/*carrom*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*_jenkins_*.log
          Parser            cri
          DB                /var/log/flb_kube4.db
          Mem_Buf_Limit     10MB
          Skip_Long_Lines   On
          Refresh_Interval  10
      [INPUT]
          Name              tail
          Alias             tail-poker
          Tag               poker.*
          Path              /var/log/containers/*poker*.log
          Exclude_Path      /var/log/containers/*rumble*.log,/var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*consul*.log,/var/log/containers/*tournament*.log,/var/log/containers/*_jenkins_*.log
          Parser            cri
          DB                /var/log/flb_kube4.db
          Mem_Buf_Limit     40MB
          Skip_Long_Lines   On
          Refresh_Interval  10
      [INPUT]
          Name              tail
          Alias             tail-ludo
          Tag               ludo.*
          Path              /var/log/containers/*ludo*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*_jenkins_*.log
          multiline.parser           cri
          DB                /var/log/flb_kube44.db
          Mem_Buf_Limit     128MB
          Skip_Long_Lines   Off
          Buffer_Max_Size   20M
          Buffer_Chunk_Size 5M
          Refresh_Interval  5
          Read_from_Head    On
          Rotate_wait       30
      [INPUT]
          Name              tail
          Alias             tail-teenpatti
          Tag               teenpatti.*
          Path              /var/log/containers/*teenpatti*.log,/var/log/containers/*jtp*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*_jenkins_*.log
          Parser            cri
          DB                /var/log/flb_kube4.db
          Mem_Buf_Limit     10MB
          Skip_Long_Lines   On
          Refresh_Interval  10
      [INPUT]
          Name              tail
          Alias             tail-howzat
          Tag               howzat.*
          Path              /var/log/containers/*league*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*_jenkins_*.log
          Parser            cri
          DB                /var/log/flb_kube6.db
          Mem_Buf_Limit     10MB
          Skip_Long_Lines   On
          Refresh_Interval  10
      [INPUT]
          Name              tail
          Alias             tail-atlantis
          Tag               atlantis.*
          Path              /var/log/containers/*atlantis*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*tournament*.log,/var/log/containers/*_jenkins_*.log
          Parser            docker
          DB                /var/log/flb_kube4.db
          Mem_Buf_Limit     10MB
          Skip_Long_Lines   On
          Refresh_Interval  10
    output-es.conf: |
      [OUTPUT]
          Name    stdout
          Match   tournament-ums.*
          Format  json
      [OUTPUT]
          Name                    es
          Alias                   es-ludo
          Match                   ludo.*
          Host                    10.34.204.127
          HTTP_User               elastic
          HTTP_Passwd             elastic@444
          Port                    9200
          Logstash_Format         On
          Logstash_Prefix         ludo-logs
      [OUTPUT]
          Name                    es
          Alias                   es-teenpatti
          Match                   teenpatti.*
          Host                    10.34.204.127
          HTTP_User               elastic
          HTTP_Passwd             elastic@444
          Port                    9200
          Logstash_Format         On
          Logstash_Prefix         teenpatti-logs
      [OUTPUT]
          Name                    es
          Alias                   es-howzat
          Match                   howzat.*
          Host                    10.34.204.127
          HTTP_User               elastic
          HTTP_Passwd             elastic@444
          Port                    9200
          Logstash_Format         On
          Logstash_Prefix         howzat-logs
      [OUTPUT]
          Name                    es
          Alias                   es-carrom
          Match                   carrom.*
          Host                    10.34.204.127
          HTTP_User               elastic
          HTTP_Passwd             elastic@444
          Port                    9200
          Logstash_Format         On
          Logstash_Prefix         carrom-logs
    output-kafka.conf: |
      [OUTPUT]
          Name           kafka
          Match          tournament.*
          Brokers        10.34.163.23:9092,10.34.180.145:9092
          Topics         pok-tour-logs
          Timestamp_Key  @timestamp
          Retry_Limit    false
          # hides errors "Receive failed: Disconnected" when kafka kills idle connections
          rdkafka.log.connection.close false
          # producer buffer is not included in http://fluentbit.io/documentation/0.12/configuration/memory_usage.html#estimating
          rdkafka.queue.buffering.max.kbytes 10240
          # for logs you'll probably want this ot be 0 or 1, not more
          rdkafka.request.required.acks 1
      [OUTPUT]
          Name           kafka
          Match          rumble.*
          Brokers        10.34.163.23:9092,10.34.180.145:9092
          Topics         pok-rum-logs
          Timestamp_Key  @timestamp
          Retry_Limit    false
          # hides errors "Receive failed: Disconnected" when kafka kills idle connections
          rdkafka.log.connection.close false
          # producer buffer is not included in http://fluentbit.io/documentation/0.12/configuration/memory_usage.html#estimating
          rdkafka.queue.buffering.max.kbytes 10240
          # for logs you'll probably want this ot be 0 or 1, not more
          rdkafka.request.required.acks 1
      [OUTPUT]
          Name           kafka
          Match          poker.*
          Brokers        10.34.163.23:9092,10.34.180.145:9092
          Topics         pok-logs
          Timestamp_Key  @timestamp
          Retry_Limit    false
          # hides errors "Receive failed: Disconnected" when kafka kills idle connections
          rdkafka.log.connection.close false
          # producer buffer is not included in http://fluentbit.io/documentation/0.12/configuration/memory_usage.html#estimating
          rdkafka.queue.buffering.max.kbytes 10240
          # for logs you'll probably want this ot be 0 or 1, not more
          rdkafka.request.required.acks 1
    parsers.conf: |
      [PARSER]
          # http://rubular.com/r/tjUt3Awgg4
          Name cri
          Format regex
          Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
          Time_Key    time
          Time_Format %Y-%m-%dT%H:%M:%S.%L%z
      [PARSER]
          Name   apache
          Format regex
          Regex  ^(?<host>[^ ]*) [^ ]* (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")?$
          Time_Key time
          Time_Format %d/%b/%Y:%H:%M:%S %z

      [PARSER]
          Name   apache2
          Format regex
          Regex  ^(?<host>[^ ]*) [^ ]* (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^ ]*) +\S*)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")?$
          Time_Key time
          Time_Format %d/%b/%Y:%H:%M:%S %z

      [PARSER]
          Name   apache_error
          Format regex
          Regex  ^\[[^ ]* (?<time>[^\]]*)\] \[(?<level>[^\]]*)\](?: \[pid (?<pid>[^\]]*)\])?( \[client (?<client>[^\]]*)\])? (?<message>.*)$

      [PARSER]
          Name   nginx
          Format regex
          Regex ^(?<remote>[^ ]*) (?<host>[^ ]*) (?<user>[^ ]*) \[(?<time>[^\]]*)\] "(?<method>\S+)(?: +(?<path>[^\"]*?)(?: +\S*)?)?" (?<code>[^ ]*) (?<size>[^ ]*)(?: "(?<referer>[^\"]*)" "(?<agent>[^\"]*)")?$
          Time_Key time
          Time_Format %d/%b/%Y:%H:%M:%S %z

      [PARSER]
          Name   json
          Format json
          Time_Key time
          Time_Format %d/%b/%Y:%H:%M:%S %z

      [PARSER]
          Name        docker
          Format      json
          Time_Key    time
          Time_Format %Y-%m-%dT%H:%M:%S.%L
          Time_Keep   On

      [PARSER]
          Name        syslog
          Format      regex
          Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
          Time_Key    time
          Time_Format %b %d %H:%M:%S
  kind: ConfigMap
  metadata:
    annotations:
      kubectl.kubernetes.io/last-applied-configuration: |
        {"apiVersion":"v1","data":{"filter-kubernetes.conf":"[FILTER]\n    Name                kubernetes\n    Match               carrom.*\n    Kube_URL            https://kubernetes.default.svc:443\n    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token\n    Kube_Tag_Prefix     carrom.var.log.containers.\n    Merge_Log           off\n    Merge_Log_Key       log_processed\n    K8S-Logging.Exclude Off\n    Labels              On\n    Annotations         off\n    K8S-Logging.Parser  On\n[FILTER]\n    Name                kubernetes\n    Match               tournament.*\n    Kube_URL            https://kubernetes.default.svc:443\n    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token\n    Kube_Tag_Prefix     tournament.var.log.containers.\n    Merge_Log           off\n    Merge_Log_Key       log_processed\n    K8S-Logging.Exclude Off\n    Labels              On\n    Annotations         off\n    K8S-Logging.Parser  On\n[FILTER]\n    Name                kubernetes\n    Match               poker.*\n    Kube_URL            https://kubernetes.default.svc:443\n    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token\n    Kube_Tag_Prefix     poker.var.log.containers.\n    Merge_Log           off\n    Merge_Log_Key       log_processed\n    K8S-Logging.Exclude Off\n    Labels              On\n    Annotations         off\n    K8S-Logging.Parser  On\n[FILTER]\n    Name                kubernetes\n    Match               rumble.*\n    Kube_URL            https://kubernetes.default.svc:443\n    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token\n    Kube_Tag_Prefix     rumble.var.log.containers.\