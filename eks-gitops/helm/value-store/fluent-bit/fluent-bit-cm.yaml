- apiVersion: v1
  data:
    filter-kubernetes.conf: |-
      [FILTER]
        Name  stdout
        Match *
      [FILTER]
          Name                kubernetes
          Match               poker.*
          Kube_URL            https://kubernetes.default.svc:443
          Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
          Kube_Tag_Prefix     poker.var.log.containers.
          Merge_Log           On
          Merge_Log_Key       log_processed
          K8S-Logging.Exclude Off
          Labels              On
          Annotations         off
          K8S-Logging.Parser  On
    fluent-bit.conf: |
      [SERVICE]
          Flush         1
          Log_Level     info
          Daemon        off
          Parsers_File  parsers.conf
          HTTP_Server   On
          HTTP_Listen   0.0.0.0
          HTTP_Port     2020

      @INCLUDE input-kubernetes.conf
      @INCLUDE filter-kubernetes.conf
      @INCLUDE output-es.conf
    input-kubernetes.conf: |
      [INPUT]
          Name              tail
          Tag               poker.*
          Path              /var/log/containers/*poker*.log
          Exclude_Path      /var/log/containers/*_hzt-*_istio-proxy-*.log,/var/log/containers/*_hzt-*_istio-init-*.log,/var/log/containers/*consul*.log,/var/log/containers/*tournament*.log,/var/log/containers/*_jenkins_*.log
          DB                /var/log/flb_kube4.db
          parser            cri
          Mem_Buf_Limit     10MB
          Skip_Long_Lines   On
          Refresh_Interval  10

      [INPUT]
          Name cpu
          Tag  cpu.local
    output-es.conf: |
      [OUTPUT]
          Name                    es
          Match                   poker.*
          Host                    10.34.204.127
          HTTP_User               elastic
          HTTP_Passwd             elastic@444
          number_of_replicas      0
          Port                    9200
          Logstash_Format         On
          Logstash_Prefix         poker-test-logs

      [OUTPUT]
          Name  null
          Match *
    parsers.conf: |
      [PARSER]
          Name   json
          Format json
          Time_Key time
          Time_Format %d/%b/%Y:%H:%M:%S %z

      [PARSER]
          Name         docker
          Format       json
          Time_Key     time
          Time_Format  %Y-%m-%dT%H:%M:%S.%L
          Time_Keep    On
      [PARSER]
          # http://rubular.com/r/tjUt3Awgg4
          Name cri
          Format regex
          Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
          Time_Key    time
          Time_Format %Y-%m-%dT%H:%M:%S.%L%z
