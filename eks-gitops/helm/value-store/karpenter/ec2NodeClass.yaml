# Single EC2NodeClass shared by both NodePools (poc-dev / poc-qa).
# AL2023, poc-eks private subnets, dedicated Karpenter node SG, node IAM role.
ec2NodeClasses:
  - name: poc
    role: "KarpenterNodeRole-poc-eks"
    # AL2023, always the latest EKS-optimized AMI for the cluster's k8s version.
    amiSelectorTerms:
      - alias: al2023@latest
    # poc-eks private subnets (eu-west-1a/b/c)
    subnetSelectorTerms:
      - id: "subnet-0214e2345846a0716"
      - id: "subnet-0eafa8ab43abb2a4a"
      - id: "subnet-09c2446717af07fd7"
    # Requested SG + the EKS cluster SG (sg-01ffda59041ac6b11) so nodes get the
    # same node <-> control-plane connectivity the managed node group has, and
    # can register with the cluster.
    securityGroupSelectorTerms:
      - id: "sg-057023568063e5e94"
      - id: "sg-01ffda59041ac6b11"
    tags:
      environment: poc
      ManagedBy: karpenter
    blockDeviceMappings:
      - deviceName: /dev/xvda
        ebs:
          volumeSize: 20Gi
          volumeType: gp3
          deleteOnTermination: true
