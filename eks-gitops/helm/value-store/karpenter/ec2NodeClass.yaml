# Single EC2NodeClass shared by both NodePools (poc-dev / poc-qa).
# AL2023, poc-eks private subnets, dedicated Karpenter node SG, node IAM role.
ec2NodeClasses:
  - name: poc
    role: "KarpenterNodeRole-poc-eks"
    # AL2023, always the latest EKS-optimized AMI for the cluster's k8s version.
    amiSelectorTerms:
      - alias: al2023@latest
    # poc-eks private subnets (eu-west-1a/b/c)
    subnetSelectorTerms:
      - id: "subnet-00646c4c7b71d7e24"
      - id: "subnet-09d82a77490fbd360"
      - id: "subnet-0d9222b53e6143433"
    # Use the specified security group for Karpenter nodes.
    securityGroupSelectorTerms:
      - id: "sg-057023568063e5e94"
    tags:
      environment: poc
      ManagedBy: karpenter
    blockDeviceMappings:
      - deviceName: /dev/xvda
        ebs:
          volumeSize: 20Gi
          volumeType: gp3
          deleteOnTermination: true
