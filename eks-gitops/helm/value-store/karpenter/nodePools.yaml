# Two NodePools for the POC, both backed by the single "poc" EC2NodeClass:
#   poc-dev -> spot instances
#   poc-qa  -> on-demand instances
# Target a pool from a workload with nodeSelector: { pool: poc-dev | poc-qa }.
nodePools:
  - name: poc-dev
    labels:
      pool: poc-dev
      environment: dev
      # "provisoner" key (mis-spelled) kept to match existing workload
      # nodeAffinity; value standardized to the pool name.
      provisoner: poc-dev
    taints:
      - key: scheduler
        value: karpenter
        effect: NoSchedule
    nodeClassRef: poc
    requirements:
      - key: "karpenter.sh/capacity-type"
        operator: In
        values: ["spot"]
      - key: "kubernetes.io/arch"
        operator: In
        values: ["amd64"]
      - key: "kubernetes.io/os"
        operator: In
        values: ["linux"]
      - key: "node.kubernetes.io/instance-type"
        operator: In
        values: ["t3.small", "t3.medium", "t3a.small", "t3a.medium"]
      - key: "topology.kubernetes.io/zone"
        operator: In
        values: ["eu-west-1a", "eu-west-1b", "eu-west-1c"]
    disruption:
      consolidationPolicy: WhenEmptyOrUnderutilized
      consolidateAfter: 1m
    cpuLimits: 20
    memoryLimits: 40Gi

  - name: poc-qa
    labels:
      pool: poc-qa
      environment: qa
      provisoner: poc-qa
    taints:
      - key: scheduler
        value: karpenter
        effect: NoSchedule
    nodeClassRef: poc
    requirements:
      - key: "karpenter.sh/capacity-type"
        operator: In
        values: ["on-demand"]
      - key: "kubernetes.io/arch"
        operator: In
        values: ["amd64"]
      - key: "kubernetes.io/os"
        operator: In
        values: ["linux"]
      - key: "node.kubernetes.io/instance-type"
        operator: In
        values: ["t3.small", "t3.medium", "t3a.small", "t3a.medium"]
      - key: "topology.kubernetes.io/zone"
        operator: In
        values: ["eu-west-1a", "eu-west-1b", "eu-west-1c"]
    disruption:
      consolidationPolicy: WhenEmptyOrUnderutilized
      consolidateAfter: 1m
    cpuLimits: 20
    memoryLimits: 40Gi
