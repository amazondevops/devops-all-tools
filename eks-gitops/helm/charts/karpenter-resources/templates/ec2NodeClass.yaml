{{- range .Values.ec2NodeClasses }}
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ .name }}
spec:
  role: {{ .role }}
  {{- if .amiFamily }}
  amiFamily: {{ .amiFamily }}
  {{- end }}
  amiSelectorTerms:
{{ toYaml .amiSelectorTerms | indent 4 }}
  subnetSelectorTerms:
{{ toYaml .subnetSelectorTerms | indent 4 }}
  securityGroupSelectorTerms:
{{ toYaml .securityGroupSelectorTerms | indent 4 }}
  {{- if .tags }}
  tags:
{{ toYaml .tags | indent 4 }}
  {{- end }}
  {{- if .metadataOptions }}
  metadataOptions:
{{ toYaml .metadataOptions | indent 4 }}
  {{- end }}
  {{- if .blockDeviceMappings }}
  blockDeviceMappings:
{{ toYaml .blockDeviceMappings | indent 4 }}
  {{- end }}
  {{- if .userData }}
  userData: |
{{ .userData | indent 4 }}
  {{- end }}
---
{{- end }}
