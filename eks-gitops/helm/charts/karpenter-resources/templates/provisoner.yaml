{{- range .Values.provisoners  }}
apiVersion: karpenter.sh/v1alpha5
kind: Provisioner
metadata:
  name: {{ .name }}
spec:
  {{- if .doNotInterrupt }}
  annotations:
    karpenter.sh/do-not-consolidate: "true"
  {{- end }}
  taints:
{{ toYaml .taints | indent 4 }}
{{- if .labels }}
  labels:
{{ toYaml .labels | indent 4 }}
{{- end }}
  requirements:
{{ toYaml .requirements | indent 4 }}
  limits:
    resources:
      cpu: {{ .cpuLimits }}
      memory:  {{ .memoryLimits }}
  providerRef:
    name: {{ .providerRef }}
  consolidation:
    enabled: {{ .consolidationEnabled }}
{{- if .kubeletConfiguration }}
  kubeletConfiguration:
{{ toYaml .kubeletConfiguration | indent 4 }}
{{- end }}
---
{{- end }}
