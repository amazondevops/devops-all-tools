apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: {{ .Values.container.name }}
    env: {{ .Values.env }}
  name: {{ .Values.container.name }}
spec:
  {{- if .Values.stopService }}
  replicas: 0
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.container.name }}
      env: {{ .Values.env }}
  strategy:
    canary:
      trafficRouting:
        istio:
          virtualService:
            name: {{ .Values.container.name }}-vsvc
            routes:
            - {{ .Values.virtualservice.routeName }}
          destinationRule:
            name: {{ .Values.container.name }}-dstnrule
            canarySubsetName: canary 
            stableSubsetName: stable 

  {{- if .Values.canarySteps.enabled }}
  {{- include "render" (dict "value" (omit .Values.canarySteps "enabled") "context" $) | nindent 6 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: {{ .Values.container.name }}
        env: {{ .Values.env }}
        app-svc: {{ .Values.container.name }}-svc
      {{- if .Values.container.annotations }}
      annotations: {{- include "render" (dict "value" .Values.container.annotations "context" .) | nindent 8 }}
      {{- else }}
      annotations:
        traffic.sidecar.istio.io/excludeOutboundIPRanges: "0.0.0.0/0"
        sidecar.istio.io/inject: "false"
      {{- end }}
    spec:
      {{- if .Values.serviceAccount }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-sa" .Values.container.name) }}
      {{- end }}
      {{- if .Values.container.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.container.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
      - image: {{ .Values.container.image }}
        {{- if .Values.container.preStopHookCommand }}
        lifecycle:
          preStop:
            exec:
              command: {{ .Values.container.preStopHookCommand | toJson }}
        {{- end }}
        imagePullPolicy: Always
        name: {{ .Values.container.name }}
        {{- if .Values.container.env }}
        env: {{- include "render" (dict "value" .Values.container.env "context" .) | nindent 10 }}
        {{- end }}
        {{- if .Values.container.command }}
        command: {{ .Values.container.command | toJson }}
        {{- end }}
        {{- if .Values.container.volumeMounts }}
        volumeMounts: {{- include "render" (dict "value" .Values.container.volumeMounts "context" .) | nindent 8 }}
        {{- end }}
        resources:
          {{- if .Values.container.resources.soft }}
          requests:
            cpu: {{ .Values.container.resources.soft.cpu }}
            memory: {{ .Values.container.resources.soft.memory }}
          {{- end }}
          {{- if .Values.container.resources.hard }}
          limits:
            cpu: {{ .Values.container.resources.hard.cpu }}
            memory: {{ .Values.container.resources.hard.memory }}
          {{- end }}
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe: {{- include "render" (dict "value" (omit .Values.livenessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe: {{- include "render" (dict "value" (omit .Values.readinessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
      {{- if .Values.tolerations }}
      tolerations: {{- include "render" (dict "value" .Values.tolerations "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity: {{- include "render" (dict "value" .Values.affinity "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.volumes }}
      volumes: {{- include "render" (dict "value" .Values.volumes "context" .) | nindent 8 }}
      {{- end }}
