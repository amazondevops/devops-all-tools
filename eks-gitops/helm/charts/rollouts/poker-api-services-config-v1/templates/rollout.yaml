apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: {{ .Values.container.name }}
    env: {{ .Values.env }}
  name: {{ .Values.container.name }}
spec:
  {{- if .Values.stopService }}
  replicas: 0
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.container.name }}
      env: {{ .Values.env }}
  strategy:
    canary:
      trafficRouting:
        istio:
          virtualService:
            name: {{ .Values.container.name }}-vsvc
            routes:
            - {{ .Values.virtualservice.routeName }}
          destinationRule:
            name: {{ .Values.container.name }}-dstnrule
            canarySubsetName: canary 
            stableSubsetName: stable 

  {{- if .Values.canarySteps.enabled }}
  {{- include "render" (dict "value" (omit .Values.canarySteps "enabled") "context" $) | nindent 6 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: {{ .Values.container.name }}
        env: {{ .Values.env }}
        app-svc: {{ .Values.container.name }}-svc
      annotations:
        traffic.sidecar.istio.io/excludeOutboundIPRanges: "0.0.0.0/0"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- include "render" (dict "value" .Values.topologySpreadConstraints "context" .) | nindent 12 }}
      {{- end }}
      containers:
      - image: {{ .Values.container.image }}
        imagePullPolicy: Always
        name: {{ .Values.container.name }}
        {{- if .Values.container.env }}
        env: {{- include "render" (dict "value" .Values.container.env "context" .) | nindent 10 }}
        {{- end }}
        resources: 
          {{- if .Values.container.resources.soft }}        
          requests:
            {{- if .Values.container.resources.soft.cpu }}
            cpu: {{ .Values.container.resources.soft.cpu }}
            {{- end }}
            memory: {{ .Values.container.resources.soft.memory }}
          {{- end }}
          {{- if .Values.container.resources.hard }}
          limits:
            {{- if .Values.container.resources.hard.cpu }}
            cpu: {{ .Values.container.resources.hard.cpu }}
            {{- end }}
            memory: {{ .Values.container.resources.hard.memory }}
          {{- end }}
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe: {{- include "render" (dict "value" (omit .Values.livenessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe: {{- include "render" (dict "value" (omit .Values.readinessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
      {{- if .Values.tolerations }}
      tolerations: {{- include "render" (dict "value" .Values.tolerations "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity: {{- include "render" (dict "value" .Values.affinity "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.container.dnsConfig }}
      dnsPolicy: "None"
      dnsConfig: 
      {{- if .Values.container.dnsConfig.options }}
        options: {{- include "render" (dict "value" .Values.container.dnsConfig.options "context" .) | nindent 12 }}
      {{- end }}
      {{- if .Values.container.dnsConfig.nameservers }}
        nameservers: {{- include "render" (dict "value" .Values.container.dnsConfig.nameservers "context" .) | nindent 12 }}
      {{- end }}
      {{- if .Values.container.dnsConfig.searches }}
        searches: {{- include "render" (dict "value" .Values.container.dnsConfig.searches "context" .) | nindent 12 }}
      {{- end }}
      {{- end }}


        
