{{- if .Values.destinationrule.create }}
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ .Values.container.name }}-dstnrule
spec:
  host: {{ .Values.container.name }}-svc
  subsets:
  - name: canary   
    labels:        
      app-svc: {{ .Values.container.name }}-svc
  - name: stable   
    labels:        
      app-svc: {{ .Values.container.name }}-svc
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: {{ .Values.container.name }}-sidecar-dstnrule
spec:
  host: {{ .Values.container.name }}-sidecar-svc
  subsets:
  - name: canary   
    labels:        
      app-svc: {{ .Values.container.name }}-svc
  - name: stable   
    labels:        
      app-svc: {{ .Values.container.name }}-svc
{{- end }}