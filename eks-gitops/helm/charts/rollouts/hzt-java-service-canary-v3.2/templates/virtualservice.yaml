apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ .Values.container.name }}-vsvc
spec:
  gateways:
  {{- range .Values.virtualservice.gateways }}
  - {{ . }}
  {{- end }}
  - mesh
  hosts:
  {{- range .Values.virtualservice.domains }}
  - {{ . }}
  {{- end }}
  - {{ .Values.container.name }}.{{ .Values.hostedzone }}
  - {{ .Values.container.name }}-svc.{{ .Values.env }}.svc.cluster.local
  http:
  - name: {{ .Values.virtualservice.routeName }}  
    route:
    - destination:
        host: {{ .Values.container.name }}-svc
        subset: stable  
      weight: {{ .Values.rollout.stableTraffic }}
    - destination:
        host: {{ .Values.container.name }}-svc
        subset: canary
      weight: {{ .Values.rollout.canaryTraffic }}
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ .Values.container.name }}-canary-vsvc
spec:
  gateways:
  - mesh
  {{- range .Values.virtualservice.gateways }}
  - {{ . }}
  {{- end }}
  hosts:
  {{- range .Values.virtualservice.domains }}
  - canary-{{ . }}
  {{- end }}
  - canary-{{ .Values.container.name }}.{{ .Values.hostedzone }}
  http:
  - name: {{ .Values.virtualservice.routeName }}  
    route:
    - destination:
        host: {{ .Values.container.name }}-svc
        subset: canary
---
{{- if .Values.PublicVirtualService }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ .Values.container.name }}-public-vsvc
spec:
  gateways:
  {{- range .Values.PublicVirtualService.gateways }}
  - {{ . }}
  {{- end }}
  hosts:
  {{- range .Values.PublicVirtualService.domains }}
  - {{ . }}
  {{- end }}
  http:
  - name: {{ .Values.virtualservice.routeName }}
  {{- if .Values.PublicVirtualService.match }}
    match: {{- include "render" (dict "value" .Values.PublicVirtualService.match "context" .) | nindent 6 }}
  {{- end }}
  {{- if .Values.PublicVirtualService.headers }}
    headers: {{- include "render" (dict "value" .Values.PublicVirtualService.headers "context" .) | nindent 6 }}
  {{- end }}
    route:
    - destination:
        host: {{ .Values.container.name }}-svc
        subset: stable  
      weight: {{ .Values.rollout.stableTraffic }}
{{- end}}