{{- if .Values.serviceAccount.iam_role }}
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: {{ .Values.container.name }}
    env: {{ .Values.env }}
  name: {{ .Values.container.name }}-sa
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.iam_role }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.container.name }}-sa-beyla-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: beyla
subjects:
- kind: ServiceAccount
  name: {{ .Values.container.name }}-sa
  namespace: {{ .Values.env }}
---
{{- end }}
